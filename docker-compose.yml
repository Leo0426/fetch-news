services:
  fetch-news:
    build: .
    ports:
      - "8080:8080"

    volumes:
      # All persistent data lives here on the host — never inside the image.
      # The directory is created automatically by Docker on first run.
      - ./data:/data

    environment:
      # ── JVM memory ──────────────────────────────────────────────────────────
      # Tune to your host. Spring Boot auto-sizes within these bounds.
      JAVA_OPTS: "-Xms128m -Xmx512m"

      # ── Bilibili cookies ─────────────────────────────────────────────────────
      # Global cookie (public routes — video, UP主动态):
      #   Grab from browser DevTools → Cookies → api.bilibili.com.
      #   Minimum: buvid3=<value>; buvid4=<value>  (no login required)
      BILIBILI_COOKIE: ""

      # Per-UID cookie (followings/dynamic、video、article routes):
      #   The UID is your own logged-in Bilibili UID.
      #   How to get: open https://api.vc.bilibili.com/dynamic_svr/v1/dynamic_svr/dynamic_new?uid=0&type=8
      #   → DevTools → Network → click dynamic_new request → copy Cookie header.
      #   For followings/dynamic: copy the FULL cookie string.
      #   For followings/video and followings/article: SESSDATA= field alone is sufficient.
      #   Replace {uid} below with your actual UID (e.g. BILIBILI_COOKIE_2267573).
      # BILIBILI_COOKIE_<uid>: ""

      # ── Twitter/X cookie ────────────────────────────────────────────────────
      # Required for Twitter GraphQL API access.
      # Copy from browser DevTools → Application → Cookies → x.com.
      # Must include at minimum: auth_token=<value>; ct0=<value>
      TWITTER_COOKIE: ""

      # ── Ollama host override ─────────────────────────────────────────────────
      # When set, overrides the host stored in data/ai-config.json.
      # Leave empty to use whatever is saved in the config file.
      #
      # Mac / Windows:  http://host.docker.internal:11434
      # Linux:          http://host.docker.internal:11434  (requires extra_hosts below)
      OLLAMA_HOST: ""

    # Linux only: allows containers to resolve host.docker.internal → host machine.
    # Safe to leave on Mac/Windows where Docker Desktop handles this automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
