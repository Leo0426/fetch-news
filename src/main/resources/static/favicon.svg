<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0a5c56"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- News lines (left side) -->
  <rect x="5.5" y="8.5" width="13" height="2.5" rx="1.25" fill="white"/>
  <rect x="5.5" y="14" width="10" height="2" rx="1" fill="white" opacity="0.8"/>
  <rect x="5.5" y="19" width="11.5" height="2" rx="1" fill="white" opacity="0.8"/>

  <!-- RSS signal (bottom-right) -->
  <circle cx="24.5" cy="25.5" r="2" fill="white"/>
  <path d="M 20.5 25.5 A 4 4 0 0 0 24.5 21.5"
        stroke="white" stroke-width="1.9" fill="none" stroke-linecap="round"/>
  <path d="M 17 25.5 A 7.5 7.5 0 0 0 24.5 18"
